<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chuyên Mục An Ủi Ly</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--rose:#e8415a;--blush:#f4a5b5;--gold:#d4a57a;--cream:#fff5f7}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Cormorant Garamond',serif;touch-action:manipulation}

/* GPU-composited layers only — no repaints */
#bgCanvas{position:fixed;inset:0;z-index:0;will-change:opacity;opacity:0;transition:opacity 1s ease}
body.activated #bgCanvas{opacity:1}

.stage{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100svh;gap:1.8rem;padding:2rem 1rem;will-change:transform}

/* Title */
.title{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(1.7rem,7vw,3rem);text-align:center;
  letter-spacing:.04em;line-height:1.25;
  color:rgba(255,245,247,.85);
  will-change:transform,opacity;
  animation:fadeInDown .9s ease both;
}
body.activated .title{
  background:linear-gradient(90deg,var(--blush),var(--gold),var(--blush));
  background-size:200%;
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  animation:fadeInDown .9s ease both,shimmer 3s linear infinite;
}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-24px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}

/* Divider */
.line{width:1px;height:50px;background:linear-gradient(to bottom,transparent,var(--rose),transparent);opacity:0;transition:opacity .8s ease}
body.activated .line{opacity:.45}

/* Heart */
.heart-wrap{position:relative;width:180px;height:180px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}

/* Ripples — CSS only, 3 elements max */
.ripple{position:absolute;border-radius:50%;border:1.5px solid rgba(232,65,90,.35);opacity:0;pointer-events:none}
.ripple:nth-child(1){inset:-16px}.ripple:nth-child(2){inset:-30px}.ripple:nth-child(3){inset:-44px}
.heart-wrap.active .ripple{animation:rippleOut 2.2s ease-out infinite}
.heart-wrap.active .ripple:nth-child(2){animation-delay:.7s}
.heart-wrap.active .ripple:nth-child(3){animation-delay:1.4s}
@keyframes rippleOut{0%{transform:scale(.85);opacity:.55}100%{transform:scale(1.35);opacity:0}}

/* SVG heart */
.heart-svg{width:100%;height:100%;will-change:transform,filter;transition:filter .7s ease}
.heart-wrap.active .heart-svg{filter:drop-shadow(0 0 22px rgba(232,65,90,.9));animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}18%{transform:scale(1.13)}35%{transform:scale(1)}50%{transform:scale(1.07)}}

/* Subtitle */
.subtitle{font-size:clamp(.85rem,3.5vw,1.1rem);font-style:italic;color:var(--blush);text-align:center;letter-spacing:.12em;opacity:0;transition:opacity .9s ease;padding:0 1rem}
body.activated .subtitle{opacity:.75}

/* Small hearts row */
.hearts-row{display:flex;gap:1.2rem;align-items:center}
.sh{font-size:1.5rem;display:inline-block;filter:grayscale(1) brightness(.3);transition:filter .8s ease}
body.activated .sh{filter:none;animation:shPulse calc(1.6s + var(--i,0) * .25s) ease-in-out infinite}
@keyframes shPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.22)}}

/* Counter */
.counter{
  position:fixed;top:1.2rem;right:1.2rem;z-index:50;
  background:rgba(10,0,5,.7);
  border:1px solid rgba(232,65,90,.2);
  border-radius:50px;padding:.4rem 1rem;
  color:var(--blush);font-size:.9rem;letter-spacing:.08em;
  display:flex;align-items:center;gap:.4rem;
  opacity:0;transition:opacity .7s ease;
}
body.activated .counter{opacity:1}
.counter-num{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--rose);font-weight:700;min-width:1.5ch;text-align:center;display:inline-block;transition:transform .15s}
.counter-num.bump{animation:numBump .28s ease}
@keyframes numBump{0%{transform:scale(1)}45%{transform:scale(1.7);color:#fff}100%{transform:scale(1)}}

/* Hint */
.hint{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);color:rgba(244,165,181,.3);font-style:italic;font-size:.8rem;letter-spacing:.18em;text-align:center;white-space:nowrap;animation:breathe 3s ease-in-out infinite;pointer-events:none}
@keyframes breathe{0%,100%{opacity:.3}50%{opacity:.65}}

/* Comfort card — NO backdrop-filter for perf */
.card{
  position:fixed;bottom:4.5rem;left:50%;
  transform:translateX(-50%) translateY(20px);
  z-index:200;width:min(400px,90vw);
  background:rgba(18,0,8,.92);
  border:1px solid rgba(232,65,90,.28);
  border-radius:16px;padding:1rem 1.4rem;
  text-align:center;pointer-events:none;
  opacity:0;animation:cardIn 3.8s ease forwards;
  will-change:opacity,transform;
}
.card-msg{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(.95rem,4vw,1.15rem);color:#fff;line-height:1.5}
.card-sub{margin-top:.35rem;font-size:.78rem;color:rgba(244,165,181,.55);letter-spacing:.1em}
@keyframes cardIn{
  0%  {opacity:0;transform:translateX(-50%) translateY(20px)}
  12% {opacity:1;transform:translateX(-50%) translateY(0)}
  72% {opacity:1;transform:translateX(-50%) translateY(0)}
  100%{opacity:0;transform:translateX(-50%) translateY(-16px)}
}

/* Milestone */
.milestone{
  position:fixed;top:50%;left:50%;z-index:300;pointer-events:none;
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(1.3rem,5vw,2.2rem);white-space:nowrap;
  color:#fff;text-shadow:0 0 30px rgba(232,65,90,1);
  animation:mileAnim 2s ease forwards;
  transform:translate(-50%,-50%);
}
@keyframes mileAnim{
  0%  {transform:translate(-50%,-50%) scale(.25);opacity:0}
  22% {transform:translate(-50%,-50%) scale(1.1);opacity:1}
  60% {transform:translate(-50%,-50%) scale(1);opacity:1}
  100%{transform:translate(-50%,-70px) scale(.7);opacity:0}
}

/* Vignette flash — simple opacity toggle */
#vignette{position:fixed;inset:0;z-index:30;pointer-events:none;background:radial-gradient(ellipse at center,transparent 25%,rgba(200,30,60,.45) 100%);opacity:0;transition:opacity .08s linear}
#vignette.flash{opacity:1}
</style>
</head>
<body>

<!-- BG drawn on canvas (gradient, no DOM overhead) -->
<canvas id="bgCanvas"></canvas>
<!-- Particle + burst canvas overlay -->
<canvas id="fxCanvas" style="position:fixed;inset:0;z-index:5;pointer-events:none"></canvas>

<div id="vignette"></div>

<div class="counter">&#x2665; <span class="counter-num" id="cNum">0</span> lời an ủi</div>

<div class="stage">
  <h1 class="title" id="title">Chuyên Mục<br>An Ủi Ly</h1>
  <div class="line"></div>

  <div class="heart-wrap" id="heart">
    <div class="ripple"></div>
    <div class="ripple"></div>
    <div class="ripple"></div>

    <svg class="heart-svg" viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="g0" cx="50%" cy="35%" r="65%">
          <stop offset="0%" stop-color="#a00e26"/>
          <stop offset="55%" stop-color="#5e000e"/>
          <stop offset="100%" stop-color="#200005"/>
        </radialGradient>
        <radialGradient id="g1" cx="50%" cy="35%" r="65%">
          <stop offset="0%" stop-color="#ff8fa3"/>
          <stop offset="45%" stop-color="#e8415a"/>
          <stop offset="100%" stop-color="#7b1535"/>
        </radialGradient>
      </defs>
      <path id="hp0" d="M50 85 C20 65,2 50,2 30 C2 14,14 5,25 5 C35 5,44 12,50 20 C56 12,65 5,75 5 C86 5,98 14,98 30 C98 50,80 65,50 85Z" fill="url(#g0)" style="transition:opacity .7s"/>
      <path id="hp1" d="M50 85 C20 65,2 50,2 30 C2 14,14 5,25 5 C35 5,44 12,50 20 C56 12,65 5,75 5 C86 5,98 14,98 30 C98 50,80 65,50 85Z" fill="url(#g1)" opacity="0" style="transition:opacity .7s"/>
      <ellipse id="hl" cx="34" cy="25" rx="10" ry="7" fill="rgba(255,255,255,.06)" transform="rotate(-25,34,25)" style="transition:fill .7s"/>
    </svg>
  </div>

  <p class="subtitle">— nhấn vào trái tim khi bạn cần được an ủi —</p>

  <div class="hearts-row">
    <span class="sh" style="--i:0">🤍</span>
    <span class="sh" style="--i:1">💗</span>
    <span class="sh" style="--i:2">❤️</span>
    <span class="sh" style="--i:3">💗</span>
    <span class="sh" style="--i:4">🤍</span>
  </div>

  <div class="line"></div>
</div>

<p class="hint">chạm vào trái tim · mỗi lần nhấn là một lời an ủi</p>

<script>
// ── DOM refs ──────────────────────────────────────────
const heart   = document.getElementById('heart');
const hp0     = document.getElementById('hp0');
const hp1     = document.getElementById('hp1');
const hl      = document.getElementById('hl');
const cNum    = document.getElementById('cNum');
const vignette= document.getElementById('vignette');
const bgCanvas= document.getElementById('bgCanvas');
const fxCanvas= document.getElementById('fxCanvas');
const bgCtx   = bgCanvas.getContext('2d');
const fx      = fxCanvas.getContext('2d');

// ── Resize canvases ───────────────────────────────────
function resize(){
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  [bgCanvas,fxCanvas].forEach(c=>{
    c.width  = window.innerWidth  * dpr;
    c.height = window.innerHeight * dpr;
    c.style.width  = window.innerWidth  + 'px';
    c.style.height = window.innerHeight + 'px';
    c.getContext('2d').scale(dpr,dpr);
  });
  drawBG();
}
window.addEventListener('resize', resize);

function drawBG(){
  const w=window.innerWidth, h=window.innerHeight;
  bgCtx.clearRect(0,0,w,h);
  // Base dark
  bgCtx.fillStyle='#0d0208';
  bgCtx.fillRect(0,0,w,h);
  // Radial glow 1
  const g1=bgCtx.createRadialGradient(w*.2,h*.4,0,w*.2,h*.4,w*.6);
  g1.addColorStop(0,'rgba(123,21,53,0.38)');g1.addColorStop(1,'transparent');
  bgCtx.fillStyle=g1;bgCtx.fillRect(0,0,w,h);
  // Radial glow 2
  const g2=bgCtx.createRadialGradient(w*.8,h*.6,0,w*.8,h*.6,w*.5);
  g2.addColorStop(0,'rgba(232,65,90,0.18)');g2.addColorStop(1,'transparent');
  bgCtx.fillStyle=g2;bgCtx.fillRect(0,0,w,h);
}
resize();

// ── Particle system (Canvas) ──────────────────────────
const EMOJIS=['❤️','💕','💗','🌸','✨','💝','🌟'];
const particles=[];
const MAX_PARTICLES = 18; // strict cap for mobile

function addParticle(){
  if(particles.length>=MAX_PARTICLES) return;
  particles.push({
    x: Math.random()*window.innerWidth,
    y: window.innerHeight + 20,
    e: EMOJIS[Math.random()*EMOJIS.length|0],
    s: .6+Math.random()*.8,     // scale
    vy:-(1.2+Math.random()*1.4),// speed
    vx:(Math.random()-.5)*.4,
    op:0, life:0,
    maxLife: 180+Math.random()*120
  });
}

// Burst particles (from click)
const bursts=[];
function addBurst(cx,cy,count){
  for(let i=0;i<count;i++){
    const a=(i/count)*Math.PI*2+Math.random()*.5;
    const sp=2.5+Math.random()*3.5;
    bursts.push({
      x:cx, y:cy,
      vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-2,
      e:EMOJIS[Math.random()*EMOJIS.length|0],
      s:.6+Math.random()*.7,
      op:1, life:0, maxLife:45+Math.random()*20
    });
  }
}

// Confetti particles
const confetti=[];
const CONF_COLORS=['#e8415a','#f4a5b5','#d4a57a','#ffb3c6','#ffd700','#ff85a1'];
function addConfetti(cx,cy,count){
  for(let i=0;i<count;i++){
    confetti.push({
      x:cx+(Math.random()-.5)*60,
      y:cy,
      vx:(Math.random()-.5)*3,
      vy:-(1+Math.random()*3),
      w:4+Math.random()*6, h:3+Math.random()*5,
      color:CONF_COLORS[Math.random()*CONF_COLORS.length|0],
      rot:Math.random()*360, vrot:(Math.random()-.5)*8,
      op:1, life:0, maxLife:50+Math.random()*30
    });
  }
}

// Shockwave rings (canvas)
const waves=[];
function addWave(cx,cy){
  waves.push({x:cx,y:cy,r:10,maxR:160,op:0.8,speed:6});
  setTimeout(()=>waves.push({x:cx,y:cy,r:10,maxR:120,op:0.5,speed:4,color:'rgba(244,165,181,'}),100);
}

let activated=false;
let particleTimer=0;
let raf;

function loop(){
  const w=window.innerWidth, h=window.innerHeight;
  fx.clearRect(0,0,w,h);

  // Ambient particles
  particleTimer++;
  if(activated && particleTimer%50===0) addParticle();

  // Draw & update ambient particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.life++;
    if(p.life>p.maxLife){particles.splice(i,1);continue;}
    p.x+=p.vx; p.y+=p.vy;
    p.op = p.life<20 ? p.life/20 : p.life>p.maxLife-30 ? (p.maxLife-p.life)/30 : 0.55;
    const sc = p.s*(10+4*Math.sin(p.life*.05));
    fx.globalAlpha=p.op*0.7;
    fx.font=`${sc}px serif`;
    fx.fillText(p.e, p.x, p.y);
  }

  // Draw & update burst particles
  for(let i=bursts.length-1;i>=0;i--){
    const b=bursts[i];
    b.life++;
    if(b.life>b.maxLife){bursts.splice(i,1);continue;}
    b.x+=b.vx; b.y+=b.vy; b.vy+=0.12; // gravity
    b.op=1-b.life/b.maxLife;
    const sc=b.s*(10+4*(1-b.life/b.maxLife));
    fx.globalAlpha=b.op;
    fx.font=`${sc}px serif`;
    fx.fillText(b.e,b.x,b.y);
  }

  // Draw & update confetti
  for(let i=confetti.length-1;i>=0;i--){
    const c=confetti[i];
    c.life++;
    if(c.life>c.maxLife){confetti.splice(i,1);continue;}
    c.x+=c.vx; c.y+=c.vy; c.vy+=0.15; c.rot+=c.vrot;
    c.op=1-c.life/c.maxLife;
    fx.globalAlpha=c.op;
    fx.save();
    fx.translate(c.x,c.y);
    fx.rotate(c.rot*Math.PI/180);
    fx.fillStyle=c.color;
    fx.fillRect(-c.w/2,-c.h/2,c.w,c.h);
    fx.restore();
  }

  // Draw shockwaves
  for(let i=waves.length-1;i>=0;i--){
    const w2=waves[i];
    w2.r+=w2.speed; w2.op-=0.04;
    if(w2.op<=0){waves.splice(i,1);continue;}
    fx.globalAlpha=w2.op;
    fx.beginPath();
    fx.arc(w2.x,w2.y,w2.r,0,Math.PI*2);
    const col=w2.color||'rgba(232,65,90,';
    fx.strokeStyle=col+w2.op+')';
    fx.lineWidth=2;
    fx.stroke();
  }

  fx.globalAlpha=1;
  raf=requestAnimationFrame(loop);
}
loop();

// ── Hover / touch activate ────────────────────────────
function activate(){
  if(activated) return;
  activated=true;
  document.body.classList.add('activated');
  heart.classList.add('active');
  hp0.style.opacity='0'; hp1.style.opacity='1';
  hl.style.fill='rgba(255,255,255,.18)';
}
function deactivate(){
  activated=false;
  document.body.classList.remove('activated');
  heart.classList.remove('active');
  hp0.style.opacity='1'; hp1.style.opacity='0';
  hl.style.fill='rgba(255,255,255,.06)';
}

heart.addEventListener('mouseenter', activate);
heart.addEventListener('mouseleave', deactivate);
// Mobile: activate on touchstart, keep active while touching
heart.addEventListener('touchstart', e=>{ e.preventDefault(); activate(); }, {passive:false});
heart.addEventListener('touchend',   e=>{ e.preventDefault(); handleClick(e.changedTouches[0]); }, {passive:false});

// ── Click handler ─────────────────────────────────────
const comfortMessages=[
  {msg:"Bạn không cần phải ổn ngay lúc này.",       sub:"Cứ để cảm xúc được nghỉ ngơi nhé."},
  {msg:"Khóc không phải là yếu đuối — đó là dũng cảm.", sub:"Bạn đang rất can đảm rồi đó."},
  {msg:"Hôm nay khó khăn không có nghĩa là ngày mai cũng vậy.", sub:"Mọi thứ rồi sẽ qua đi thôi."},
  {msg:"Bạn đã làm hết sức rồi — thế là đủ.",       sub:"Đừng tự trách bản thân nữa nhé."},
  {msg:"Mình ở đây, ngay bên cạnh bạn.",             sub:"Bạn không đơn độc đâu."},
  {msg:"Không ai hoàn hảo — kể cả ngày hôm nay.",   sub:"Ngày mai bạn lại thử lại được mà."},
  {msg:"Thở sâu một cái đi — bạn làm được mà.",     sub:"Từng nhịp thở là một bước nhỏ về phía trước."},
  {msg:"Cảm xúc của bạn xứng đáng được lắng nghe.", sub:"Mình tin vào điều bạn đang cảm thấy."},
  {msg:"Bạn đã vượt qua những ngày khó hơn thế này.", sub:"Và bạn sẽ vượt qua được lần này nữa."},
  {msg:"Đừng so sánh nỗi đau của bạn với người khác.", sub:"Nỗi đau của bạn là thật và đáng được quan tâm."},
  {msg:"Nghỉ ngơi cũng là một dạng tiến về phía trước.", sub:"Không cần mạnh mẽ mọi lúc đâu bạn ơi."},
  {msg:"Bạn xứng đáng được yêu thương — từ chính mình.", sub:"Hãy nhẹ nhàng với bản thân một chút nhé."},
  {msg:"Có những ngày tồn tại thôi là đủ dũng cảm rồi.", sub:"Hôm nay bạn đã làm được điều đó."},
  {msg:"Bạn quan trọng hơn bạn nghĩ rất nhiều.",    sub:"Sự có mặt của bạn tạo ra sự khác biệt."},
  {msg:"Ánh sáng vẫn ở đâu đó phía trước.",         sub:"Cứ bước từng bước nhỏ thôi nhé."},
  {msg:"Mọi thứ đang rất nặng nề — mình hiểu.",     sub:"Nhưng bạn không phải gánh một mình đâu."},
  {msg:"Cơ thể bạn đang cố chữa lành từng ngày.",   sub:"Hãy cho nó thêm chút thời gian nhé."},
  {msg:"Bạn không cần giải thích nỗi buồn cho ai.", sub:"Cảm xúc không cần lý do mới được tồn tại."},
];
const milestones={5:"🌸 Bạn không cô đơn đâu 🌸",10:"✨ Cứ để cảm xúc chảy đi ✨",20:"💛 Bạn đủ mạnh để vượt qua 💛",30:"🌙 Ngày mai trời lại sáng 🌙",50:"⭐ Bạn thật dũng cảm rồi đó ⭐",99:"🌟 Mình tự hào về bạn lắm 🌟"};

let count=0, lastCard=-1, cardEl=null, vigTimer=null;

function handleClick(touch){
  // Get center of heart on mobile
  const rect=heart.getBoundingClientRect();
  const cx=touch ? touch.clientX : (rect.left+rect.right)/2;
  const cy=touch ? touch.clientY : (rect.top+rect.bottom)/2;

  count++;
  cNum.textContent=count;
  cNum.classList.remove('bump'); void cNum.offsetWidth; cNum.classList.add('bump');

  // Vignette flash (CSS transition, no new DOM)
  clearTimeout(vigTimer);
  vignette.classList.add('flash');
  vigTimer=setTimeout(()=>vignette.classList.remove('flash'),300);

  // Canvas effects (no DOM spam)
  addWave(cx,cy);
  addBurst(cx,cy, 10); // reduced from 28
  addConfetti(cx,cy, 12); // reduced from 25

  // Comfort card (single DOM element, recycled)
  let idx; do{idx=Math.random()*comfortMessages.length|0}while(idx===lastCard);
  lastCard=idx;
  const {msg,sub}=comfortMessages[idx];
  if(cardEl){cardEl.remove();cardEl=null;}
  cardEl=document.createElement('div');
  cardEl.className='card';
  cardEl.innerHTML='<div class="card-msg">'+msg+'</div><div class="card-sub">'+sub+'</div>';
  document.body.appendChild(cardEl);
  setTimeout(()=>{if(cardEl){cardEl.remove();cardEl=null;}},4000);

  // Milestone
  if(milestones[count]){
    const m=document.createElement('div');
    m.className='milestone';m.textContent=milestones[count];
    document.body.appendChild(m);
    setTimeout(()=>m.remove(),2200);
  }

  // Mega burst x10 — also canvas, smaller count
  if(count%10===0) addBurst(cx,cy,20);
}

heart.addEventListener('click', e=>handleClick(null));
</script>
</body>
</html>
